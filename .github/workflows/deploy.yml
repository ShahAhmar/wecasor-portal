name: Build and Deploy to cPanel (via SSH/rsync)

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 🛠️ Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql
          coverage: none

      - name: 🛠️ Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: 🛠️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🛠️ Install NPM dependencies and Build
        run: |
          npm install --legacy-peer-deps
          npm run build

      - name: 📂 Deploy to Server via SSH (rsync)
        uses: easingthemes/ssh-deploy@v5.1.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_USER: ${{ secrets.SSH_USER }}
          TARGET: ${{ secrets.SSH_TARGET }}
          EXCLUDE: "/.git/, /.github/, /node_modules/, /tests/, /.env, /storage/*.key, /vendor/"
          ARGS: "-rlgoDzvc -i --delete"
          SCRIPT_AFTER: |
            echo "Deployment finished successfully!"
