---
deployment:
  tasks:
    - export DEPLOYPATH=/home/wecawvix/portal.wecasor.com/
    - /bin/cp -R * $DEPLOYPATH
    - cd $DEPLOYPATH && /usr/local/bin/composer install --no-dev --optimize-autoloader
    - cd $DEPLOYPATH && /usr/local/bin/php artisan optimize
    - cd $DEPLOYPATH && /usr/local/bin/php artisan migrate --force
